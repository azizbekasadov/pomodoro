name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  build-and-test:
    name: Build and Test
    runs-on: macos-15
    needs: swiftlint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace Pomodoro.xcworkspace \
            -scheme Pomodoro \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Build
        run: |
          xcodebuild clean build \
            -workspace Pomodoro.xcworkspace \
            -scheme Pomodoro \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -workspace Pomodoro.xcworkspace \
            -scheme Pomodoro \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
